name: Backup recovery checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup-recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_password
          MYSQL_DATABASE: jingyi_backup_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pci_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Install MySQL client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client-8.0
      - name: Check backup JavaScript syntax
        run: |
          node --check server/src/utils/backupCrypto.js
          node --check server/src/services/backupService.js
          node --check server/src/services/dataRetentionService.js
          node --check server/src/services/backupScheduleService.js
          node --check server/src/services/backupSchemaService.js
          node --check server/src/controllers/backupController.js
          node --check scripts/apply-backup-recovery-migration.js
          node --check scripts/backup-recovery-check.js
          node --check scripts/mysql-backup-recovery-check.js
          node --check scripts/disaster-recovery-drill.js
      - name: Run isolated backup recovery regression
        run: npm run check:backup-recovery
      - name: Initialize legacy MySQL schema
        env:
          INITIALIZE_LEGACY_RESERVATION_SCHEMA: 'true'
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: ci_password
          MYSQL_DATABASE: jingyi_backup_ci
        run: node scripts/initialize-ci-mysql.js
      - name: Apply reservation migration
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: ci_password
          MYSQL_DATABASE: jingyi_backup_ci
        run: node scripts/apply-reservation-consistency-migration.js
      - name: Apply notification migration
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: ci_password
          MYSQL_DATABASE: jingyi_backup_ci
        run: node scripts/apply-notification-outbox-migration.js
      - name: Apply observability migration
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: ci_password
          MYSQL_DATABASE: jingyi_backup_ci
        run: node scripts/apply-observability-audit-migration.js
      - name: Apply backup recovery migration
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: ci_password
          MYSQL_DATABASE: jingyi_backup_ci
        run: node scripts/apply-backup-recovery-migration.js
      - name: Reapply backup recovery migration
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: ci_password
          MYSQL_DATABASE: jingyi_backup_ci
        run: node scripts/apply-backup-recovery-migration.js
      - name: Verify production data readiness
        env:
          NODE_ENV: production
          ALLOW_MOCK_DB: 'false'
          ALLOW_MOCK_REDIS: 'false'
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: ci_password
          MYSQL_DATABASE: jingyi_backup_ci
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: node scripts/production-data-readiness-check.js
      - name: Run real MySQL backup and restore regression
        env:
          NODE_ENV: test
          ALLOW_MOCK_DB: 'false'
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: ci_password
          MYSQL_DATABASE: jingyi_backup_ci
        run: |
          set -o pipefail
          node scripts/mysql-backup-recovery-check.js 2>&1 | tee mysql-backup-recovery.log
      - name: Upload backup diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-recovery-diagnostics
          path: mysql-backup-recovery.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Run server integration check
        run: npm run test:integration
        working-directory: server
