name: Runtime coordination checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-coordination:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            admin/package-lock.json
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Install admin dependencies
        run: npm ci
        working-directory: admin
      - name: Check runtime JavaScript syntax
        run: |
          node --check server/src/config/redis.js
          node --check server/src/middleware/auth.js
          node --check server/src/services/distributedLockService.js
          node --check server/src/services/schedulerService.js
          node --check server/src/services/socketConnectionRateLimitService.js
          node --check server/src/services/socketAuthService.js
          node --check server/src/services/socketRedisAdapterService.js
          node --check server/src/services/realtimeEventService.js
          node --check server/src/scheduler-worker.js
          node --check server/src/app.js
          node --check scripts/runtime-coordination-check.js
          node --check scripts/socket-connection-rate-limit-check.js
          node --check scripts/socket-auth-check.js
          node --check scripts/socket-adapter-check.js
          node --check scripts/realtime-event-check.js
          node --check scripts/redis-runtime-integration-check.js
      - name: Run isolated runtime coordination regression
        run: npm run check:runtime-coordination
      - name: Run real Redis runtime integration
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_DB: 15
          ALLOW_MOCK_REDIS: 'false'
        run: node scripts/redis-runtime-integration-check.js
      - name: Run server integration check
        run: npm run test:integration
        working-directory: server
      - name: Build authenticated monitoring client
        run: npm run build
        working-directory: admin
